# Step 3: learn a physical direction on a labelled (synthetic) cache, steer + decode a target cache.
# Direction quality is judged by monotonic transfer of an independent readout across the alpha sweep.
variable: vel            # state-key substring: vel | acc | gravity | pos | radius
layer: -1                # intervention layer; -1 = deepest available
alphas: [-3.0, -1.5, 0.0, 1.5, 3.0]
method: regression       # regression | diff_means
num_samples: 4
